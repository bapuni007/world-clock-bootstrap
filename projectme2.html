    <div class="container">
        <h2 class="take-center">TODOs List</h2>
            <div class="form-group">
                <label for="title">Title</label>

            </div>

                <label for="description">Description</label>
                <textarea class="form-control" id="description" rows="3"></textarea>
            </div>

            <button id="add" class="btn btn-primary">Add to list</button>
            <button id = "clear" class="btn btn-primary" onclick = "clearStorage()">Clear list</button>
        <div id="items" class="my-4">
            <h2>Your Items</h2>
            <table class="table">
  <thead>
    <tr>
      <th scope="col">SNo</th>
      <th scope="col">Item Title</th>
      <th scope="col">Item Description</th>
      <th scope="col">Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr>
      <th scope="row">1</th>
      <td>Get some Coffee</td>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"

        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"
        integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
        crossorigin="anonymous"></script>
         <script>
            function update() {
    console.log("Updating List....");
    const tit = document.getElementById('title').value.trim();
    const desc = document.getElementById('description').value.trim();

    let itemJsonArray;
    const itemJsonArrayStr = localStorage.getItem('itemsJson');

    if (itemJsonArrayStr === null) {
        // nothing saved yet
        itemJsonArray = [];
    } else {
        try {
            itemJsonArray = JSON.parse(itemJsonArrayStr);
            if (!Array.isArray(itemJsonArray)) {
                itemJsonArray = []; // reset if corrupted
            }
        } catch (e) {
            itemJsonArray = []; // reset if parse fails
        }
    }

    // add new item
    if(tit !== "" || desc !== ""){
    itemJsonArray.push([tit, desc]);
    localStorage.setItem('itemsJson', JSON.stringify(itemJsonArray));
    }
    // populate the table
    let tableBody = document.getElementById("tableBody");
    let str = "";
    itemJsonArray.forEach((element, index) => {
        str += `
        <tr>
            <th scope="row">${index + 1}</th>
            <td>${element[0]}</td>
            <td>${element[1]}</td>
            <td><button class="btn btn-sm btn-primary" onclick="deleted(${index})">Delete</button></td>
        </tr>`;
    });
    tableBody.innerHTML = str;
    document.getElementById('title').value = "";
document.getElementById('description').value = "";

}

            
            add=document.getElementById("add");
            add.addEventListener("click", update);
            update(); 
            function deleted(itemIndex){
                console.log("Delete", itemIndex);
                itemJsonArrayStr= localStorage.getItem('itemsJson')
                itemJsonArray=JSON.parse(itemJsonArrayStr);
               //Delete itemIndex Element from the array
               itemJsonArray.splice(itemIndex, 1);
                localStorage.setItem('itemsJson', JSON.stringify(itemJsonArray));
                update();
            }
            function clearStorage(){
                if (confirm("Do  you really want to clear?")){
                console.log('Clear the storage');
                localStorage.removeItem("itemJson");
                document.getElementById("tableBody").innerHTML = "";
                
            }
        }
        </script>
